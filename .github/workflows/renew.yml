name: ACL Clouds Auto Renew

on:
  schedule:
    - cron: '0 3 * * *'  # 每天 UTC 3点跑一次，配合脚本里"到期前2天可续期"的窗口，留出充足重试余量
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 运行续期脚本
        env:
          ACL_COOKIES: ${{ secrets.ACL_COOKIES }}
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: python renew.py

      - name: 上传 sing-box 日志（失败排查用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-log
          path: sing-box.log
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
